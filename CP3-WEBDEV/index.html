<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda de contas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginTela" class="container">

<h1>Login</h1>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="fazerLogin()">Entrar</button>

<p id="erroLogin" class="erro"></p>

</div>

<div id="crudTela" class="container escondido">

<h1>Venda de contas</h1>

<input type="text" id="novoItem" placeholder="Digite uma conta">

<button onclick="adicionarFinal()">Adicionar no Final</button>

<button onclick="adicionarInicio()">Adicionar no Início</button>

<p id="erroItem" class="erro"></p>

<ul id="listaItens"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
